jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./backend
                  push: true
                  tags: ghcr.io/${{ github.repository_owner }}/dbbconnect-backend:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        env:
            SSH_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
            SSH_DEST: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
            DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
                  chmod 600 ~/.ssh/id_deploy
                  ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

            - name: Sync compose file
              run: |
                  rsync -az -e "ssh -i ~/.ssh/id_deploy -p $SSH_PORT" \
                    ./docker-compose.prod.yml "$SSH_DEST:$DEPLOY_PATH/docker-compose.prod.yml"

            - name: Pull & restart backend
              run: |
                  ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_DEST" \
                    "cd '$DEPLOY_PATH' && docker compose -f docker-compose.prod.yml pull backend && docker compose -f docker-compose.prod.yml up -d postgres backend && docker image prune -f"
