name: Deploy Backend

# Builds on the runner to fail fast, then rsyncs the backend + compose file to
# the VPS over SSH and rebuilds just the backend (and postgres) containers.
on:
    push:
        branches: [main]
        paths:
            - 'backend/**'
            - 'docker-compose.prod.yml'
            - '.github/workflows/deploy-backend.yml'
    workflow_dispatch:

concurrency:
    group: deploy-backend
    cancel-in-progress: false

