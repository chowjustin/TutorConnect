name: CI

# Build + typecheck both apps on every PR and push. This is the correctness
# gate; the deploy workflows re-run the relevant build before shipping.
on:
    pull_request:
    push:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.30.3
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: backend/pnpm-lock.yaml
            - run: pnpm install --frozen-lockfile
            - run: pnpm prisma generate
            - run: pnpm build

